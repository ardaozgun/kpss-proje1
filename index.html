<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KPSS 2026 Takip</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #111; border-right: 1px solid #333; padding: 20px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 10px; background: #1a1a1a; }
        .nav-item:hover { background: #222; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        #login-box { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 999; }
        .box { background: #111; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        input { display: block; width: 250px; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { background: #8b5cf6; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2>KPSS 2026 Giriş</h2>
        <input type="password" id="pass" placeholder="Şifre: 1234">
        <button onclick="check()">Giriş Yap</button>
    </div>

    <div id="app" style="display:none; width: 100%; display: flex;">
        <aside class="sidebar">
            <div class="nav-item" onclick="show('videos')">🎬 Ders Videoları</div>
            <div class="nav-item" onclick="show('calc')">🧮 Net Hesapla</div>
        </aside>
        <main class="content">
            <div id="videos" class="page active">
                <h2>Ders Listesi</h2>
                <div id="video-content"></div>
            </div>
            <div id="calc" class="page">
                <h2>Net Hesaplama</h2>
                <input id="net-gir" placeholder="Toplam Net">
                <button onclick="hesapla()">Puanı Gör</button>
                <h3 id="puan-sonuc"></h3>
            </div>
        </main>
    </div>

    <script>
        const dersler = [
            {ad: "Türkçe", sayi: 46}, {ad: "Matematik", sayi: 81}, 
            {ad: "Tarih", sayi: 60}, {ad: "Coğrafya", sayi: 34}, {ad: "Vatandaşlık", sayi: 48}
        ];

        function check() {
            if(document.getElementById('pass').value === '1234') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                initVideos();
            } else { alert('Hatalı!'); }
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function initVideos() {
            const container = document.getElementById('video-content');
            container.innerHTML = ""; // İçini temizle
            dersler.forEach(d => {
                let html = `<div style="background:#1a1a1a; padding:15px; margin-bottom:10px; border-radius:8px;"><h3>${d.ad}</h3>`;
                for(let i=1; i<=d.sayi; i++) {
                    html += `<div style="padding:5px;"><input type="checkbox"> ${i}. Ders</div>`;
                }
                container.innerHTML += html + `</div>`;
            });
        }

        function hesapla() {
            let n = document.getElementById('net-gir').value;
            document.getElementById('puan-sonuc').innerText = "Tahmini Puan: " + (50 + (n * 0.65)).toFixed(2);
        }
    </script>
</body>
</html>
